<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"
        integrity="sha512-+4zCK9k+qNFUR5X+cKL9EIR+ZOhtIloNl9GIKS57V1MyNsYpYcUrUeQc9vNfzsWfV28IaLL3i96P9sdNyeRssA=="
        crossorigin="anonymous" />
    <!-- 
    - favicon
  -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%2210 0 100 100%22><text y=%22.90em%22 font-size=%2290%22>🔐</text></svg>">
    <link rel="stylesheet" href="style.css">
    <title>SignMeUp</title>
</head>

<body>
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="registerForm">
                <h1>Daftar</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="social"><i class="fab fa-google"></i></a>
                    <!-- <a href="#" class="social"><i class="fab fa-facebook"></i></a> -->
                    <a href="#" class="social"><i class="fab fa-facebook"></i></a>
                </div>
                <span>atau gunakan email Anda untuk pendaftaran</span>
                <input type="text" id="registerUsername" placeholder="Nama" />
                <input type="email" id="registerEmail" placeholder="Email" />
                <input type="password" id="registerPassword" placeholder="Kata Sandi" />
                <button type="submit">Daftar</button>
            </form>
        </div>
        <div class="form-container sign-in-container">
            <form id="loginForm">
                <h1>Masuk</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-instagram"></i></a>
                    <a href="#" class="social"><i class="fab fa-google"></i></a>
                    <a href="#" class="social"><i class="fab fa-facebook"></i></a>
                </div>
                <span>atau gunakan akun Anda</span>
                <input type="text" id="loginUsername" placeholder="Nama Pengguna" />
                <input type="password" id="loginPassword" placeholder="Kata Sandi" />
                <a href="#">Lupa kata sandi Anda?</a>
                <button type="submit">Masuk</button>
                <div id="alertBox" class="alert" style="display:none;"></div>
            </form>
        </div>
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Selamat Datang Kembali!</h1>
                    <p>Silakan masuk dengan info pribadi Anda</p>
                    <button class="ghost" id="signIn">Masuk</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Halo, Teman! </h1>
                    <p>Masukkan detail pribadi Anda dan mulai perjalanan Anda bersama kami</p>
                    <button class="ghost" id="signUp">Daftar</button>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script src="js/login.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
